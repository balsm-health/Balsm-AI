<!-- @dsCard group="Components" name="TopLoadingBar" subtitle="route / page progress · trickle · determinate · indeterminate" viewport="760x300" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:22px}
    .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);font-weight:600;font-family:var(--font-body);margin-bottom:10px}
    .frame{position:relative;border:1px solid var(--balsm-ink-200);border-radius:var(--radius-md);overflow:hidden;background:var(--balsm-cream-50);height:84px}
    .frame-bar{height:34px;background:#fff;border-bottom:1px solid var(--balsm-ink-100);display:flex;align-items:center;gap:6px;padding:0 12px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--balsm-ink-200)}
    .frame-body{display:flex;align-items:center;justify-content:center;height:50px;font-size:12px;color:var(--fg3)}
    .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function TopLoadingBar({ value=null, loading, variant='primary', height=3, contained=false, indeterminate=false, className='', style, ...rest }) {
    const managed=value==null&&typeof loading==='boolean';
    const [auto,setAuto]=React.useState(0); const [visible,setVisible]=React.useState(false);
    React.useEffect(()=>{
      if(!managed)return; let timer;
      if(loading){setVisible(true);setAuto(a=>a>0?a:8);timer=setInterval(()=>setAuto(a=>a>=90?a:Math.min(90,a+(90-a)*0.06+0.4)),280);return()=>clearInterval(timer);}
      if(visible){setAuto(100);const t=setTimeout(()=>{setVisible(false);setAuto(0);},420);return()=>clearTimeout(t);}
    },[loading,managed]);
    const pct=managed?auto:(value??0); const done=managed?!loading:pct>=100;
    if(managed&&!visible&&!loading)return null;
    const cls=['b-toploader', contained&&'b-toploader--contained', variant!=='primary'&&`b-toploader--${variant}`, indeterminate&&'b-toploader--indeterminate', done&&!indeterminate&&'b-toploader--done', className].filter(Boolean).join(' ');
    return <div className={cls} style={{height,...style}} role="progressbar" {...rest}><div className="b-toploader__bar" style={indeterminate?undefined:{width:`${pct}%`}}/></div>;
  }

  function Frame({children,label}) {
    return <div><div className="lbl">{label}</div>
      <div className="frame">{children}
        <div className="frame-bar"><span className="dot"/><span className="dot"/><span className="dot"/></div>
        <div className="frame-body">page content</div>
      </div></div>;
  }

  function Demo() {
    const [det,setDet]=React.useState(10);
    const [loading,setLoading]=React.useState(true);
    React.useEffect(()=>{const t=setInterval(()=>setDet(v=>v>=100?12:v+3),140);return()=>clearInterval(t)},[]);
    React.useEffect(()=>{const t=setInterval(()=>setLoading(l=>!l),2600);return()=>clearInterval(t)},[]);
    return (
      <div className="wrap">
        <div className="three">
          <Frame label="Determinate"><TopLoadingBar value={det} contained/></Frame>
          <Frame label="Auto-trickle (loading toggles)"><TopLoadingBar loading={loading} contained variant="brand"/></Frame>
          <Frame label="Indeterminate · accent"><TopLoadingBar indeterminate contained variant="accent"/></Frame>
        </div>
        <div style={{fontSize:12,color:'var(--fg3)',fontFamily:'var(--font-body)'}}>
          Pins to the top edge (here contained to each frame). Trickle creeps to ~90% then completes and fades when the route resolves.
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
