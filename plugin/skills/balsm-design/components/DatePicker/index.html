<!-- @dsCard group="Components" name="DatePicker" subtitle="calendar · DD/MM/YYYY · min/max · RTL" viewport="720x420" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const { DatePicker } = window.BalsmDesignSystem_51cdbf;
  const today = new Date();
  const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const minISO = iso(new Date(today.getFullYear(), today.getMonth(), today.getDate()-3));

  function Demo() {
    const [appt, setAppt]   = React.useState(iso(today));
    const [dob, setDob]     = React.useState(null);
    const [ar, setAr]       = React.useState(iso(today));
    return (
      <div className="wrap">
        <DatePicker label="Appointment date" value={appt} onChange={setAppt}
          hint="Egypt format — DD/MM/YYYY" fullWidth/>
        <DatePicker label="Date of birth" value={dob} onChange={setDob}
          placeholder="Select date of birth" error={!dob ? 'Required' : undefined}
          max={iso(today)} fullWidth/>
        <DatePicker label="Disabled" value={iso(today)} disabled fullWidth/>
        <DatePicker label="تاريخ الموعد" value={ar} onChange={setAr}
          min={minISO} dir="rtl" hint="لا يمكن اختيار تاريخ في الماضي البعيد" fullWidth/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
