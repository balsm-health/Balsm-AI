<!-- @dsCard group="Components" name="Toast" subtitle="success · warning · danger · info · with action · auto-dismiss" viewport="560x430" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:var(--balsm-surface-muted)}
    .wrap{padding:24px;display:flex;flex-direction:column;gap:12px}
    /* disable entrance animations for static preview */
    .b-toast { animation: none !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function IcoSuccess() { return <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="10" cy="10" r="8"/><path d="M6.5 10l2.5 2.5 5-5"/></svg>; }
  function IcoWarning() { return <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M10 2L1 18h18L10 2z"/><line x1="10" y1="9" x2="10" y2="13"/><circle cx="10" cy="15.5" r=".6" fill="currentColor" stroke="none"/></svg>; }
  function IcoDanger()  { return <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="10" cy="10" r="8"/><line x1="7" y1="7" x2="13" y2="13"/><line x1="13" y1="7" x2="7" y2="13"/></svg>; }
  function IcoInfo()    { return <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="10" cy="10" r="8"/><line x1="10" y1="9" x2="10" y2="14"/><circle cx="10" cy="6.5" r=".6" fill="currentColor" stroke="none"/></svg>; }
  function IcoClose()   { return <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>; }

  const ICONS = { success:<IcoSuccess/>, warning:<IcoWarning/>, danger:<IcoDanger/>, info:<IcoInfo/> };

  function Toast({ variant='info', title, message, action, closeable=true, onClose }) {
    return (
      <div className={`b-toast b-toast--${variant}`} role="alert">
        <span className="b-toast__icon" aria-hidden="true">{ICONS[variant]}</span>
        <div className="b-toast__body">
          {title   && <div className="b-toast__title">{title}</div>}
          {message && <div className="b-toast__msg">{message}</div>}
          {action  && <button type="button" className="b-toast__action" onClick={action.onClick}>{action.label}</button>}
        </div>
        {closeable && <button type="button" className="b-toast__close" onClick={onClose} aria-label="Dismiss"><IcoClose/></button>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <div className="wrap">
      <Toast variant="success" title="Sale completed" message="LE 245.00 — receipt sent to patient" onClose={()=>{}}/>
      <Toast variant="info" title="Sync in progress" message="3 prescriptions uploading to cloud…" closeable={false}/>
      <Toast variant="warning" title="Low stock alert" message="Paracetamol 500mg — 8 units remaining" action={{label:'Reorder now',onClick:()=>{}}} onClose={()=>{}}/>
      <Toast variant="danger" title="Medication recall" message="Lot #EG-2024-0881 must be pulled from shelf immediately" action={{label:'View affected items',onClick:()=>{}}} onClose={()=>{}}/>
    </div>
  );
</script>
</body>
</html>
