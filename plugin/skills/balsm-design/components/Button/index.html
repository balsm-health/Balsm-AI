<!-- @dsCard group="Components" name="Button" subtitle="primary · secondary · ghost · danger · link · loading · sizes" viewport="700x300" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:24px;display:flex;flex-direction:column;gap:18px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);
         font-weight:600;width:76px;flex-shrink:0;font-family:var(--font-body)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function Button({ variant='primary', size='md', loading=false, disabled=false, icon=null, iconTrailing=null, fullWidth=false, children, onClick, type='button', className='', style, ...rest }) {
    const cls = ['b-btn',`b-btn-${size}`,`b-btn-${variant}`,loading&&'b-btn--loading',fullWidth&&'b-btn--full',className].filter(Boolean).join(' ');
    return <button type={type} className={cls} disabled={disabled||loading} onClick={onClick} style={style} aria-busy={loading||undefined} {...rest}>
      {loading ? <span className="b-spinner" aria-hidden="true"/> : icon && <span className="b-icon" aria-hidden="true">{icon}</span>}
      <span>{children}</span>
      {!loading && iconTrailing && <span className="b-icon" aria-hidden="true">{iconTrailing}</span>}
    </button>;
  }

  const Plus = () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>;
  const Trash = () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><polyline points="3,4 13,4"/><path d="M5 4V3h6v1"/><path d="M6 7v5M10 7v5"/><rect x="4" y="4" width="8" height="9" rx="1"/></svg>;
  const Arrow = () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>;

  ReactDOM.createRoot(document.getElementById('root')).render(
    <div className="wrap">
      <div className="row">
        <span className="lbl">Sizes</span>
        <Button size="sm">Small</Button>
        <Button size="md">Default</Button>
        <Button size="lg">Large</Button>
      </div>
      <div className="row">
        <span className="lbl">Variants</span>
        <Button icon={<Plus/>}>New prescription</Button>
        <Button variant="secondary" icon={<Plus/>}>Add item</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="link" iconTrailing={<Arrow/>}>View receipt</Button>
        <Button variant="danger" icon={<Trash/>}>Void sale</Button>
      </div>
      <div className="row">
        <span className="lbl">States</span>
        <Button loading>Syncing…</Button>
        <Button variant="secondary" loading>Saving</Button>
        <Button disabled>Disabled</Button>
        <Button variant="secondary" disabled>Disabled</Button>
      </div>
    </div>
  );
</script>
</body>
</html>
