<!-- @dsCard group="Components" name="TimePicker" subtitle="hour/minute columns · 12h or 24h · step · RTL" viewport="720x360" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const { TimePicker } = window.BalsmDesignSystem_51cdbf;

  function Demo() {
    const [slot, setSlot]   = React.useState('09:30');
    const [t12, setT12]     = React.useState('14:15');
    const [dose, setDose]   = React.useState(null);
    const [ar, setAr]       = React.useState('08:00');
    return (
      <div className="wrap">
        <TimePicker label="Appointment slot" value={slot} onChange={setSlot}
          minuteStep={15} hint="15-minute slots, 24-hour" fullWidth/>
        <TimePicker label="Pickup time" value={t12} onChange={setT12}
          use12Hour minuteStep={5} hint="12-hour with AM/PM" fullWidth/>
        <TimePicker label="Next dose" value={dose} onChange={setDose}
          placeholder="Set dose time" error={!dose ? 'Required' : undefined} fullWidth/>
        <TimePicker label="موعد العيادة" value={ar} onChange={setAr}
          minuteStep={30} min="08:00" max="20:00" dir="rtl"
          hint="ساعات العمل ٨ ص – ٨ م" fullWidth/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
