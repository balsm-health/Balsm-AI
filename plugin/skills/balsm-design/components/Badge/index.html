<!-- @dsCard group="Components" name="Badge" subtitle="clinical states · regulatory · roles · dismissible chips" viewport="700x240" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:22px;display:flex;flex-direction:column;gap:16px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);
         font-weight:600;width:100px;flex-shrink:0;font-family:var(--font-body)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function Badge({ variant='neutral', size='md', dot=false, icon=null, onRemove=null, children, className='', style, ...rest }) {
    const cls = ['b-badge',`b-badge--${variant}`,size==='sm'&&'b-badge--sm',className].filter(Boolean).join(' ');
    return <span className={cls} style={style} {...rest}>
      {icon ? <span className="b-badge__icon" aria-hidden="true">{icon}</span> : dot && <span className="b-badge__dot" aria-hidden="true"/>}
      {children}
      {onRemove && <button type="button" className="b-badge__remove" onClick={onRemove} aria-label="Remove">×</button>}
    </span>;
  }

  const Shield = () => <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6 1L1 3.5v3C1 9 3.5 11 6 11c2.5 0 5-2 5-4.5v-3L6 1z"/><line x1="6" y1="4" x2="6" y2="6.5"/><circle cx="6" cy="8" r=".5" fill="currentColor" stroke="none"/></svg>;
  const Warn = () => <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6 1L1 10h10L6 1z"/><line x1="6" y1="5" x2="6" y2="7.5"/><circle cx="6" cy="9" r=".4" fill="currentColor" stroke="none"/></svg>;

  function Demo() {
    const [chips, setChips] = React.useState(['Paracetamol', 'Amoxicillin', 'Ibuprofen']);
    return (
      <div className="wrap">
        <div className="row">
          <span className="lbl">Clinical</span>
          <Badge variant="success" dot>Dispensed</Badge>
          <Badge variant="info" dot>Synced</Badge>
          <Badge variant="warning" dot>Low stock · 12 left</Badge>
          <Badge variant="danger" dot>Expired</Badge>
          <Badge variant="expiring" dot>Expires in 14 d</Badge>
        </div>
        <div className="row">
          <span className="lbl">Regulatory</span>
          <Badge variant="controlled" icon={<Shield/>}>Schedule II</Badge>
          <Badge variant="controlled" dot>Pharmacist sign-off required</Badge>
          <Badge variant="warning" icon={<Warn/>}>Prescription needed</Badge>
        </div>
        <div className="row">
          <span className="lbl">Roles · misc</span>
          <Badge variant="brand">Active</Badge>
          <Badge variant="outline">Pharmacist</Badge>
          <Badge variant="neutral" dot>Offline · 3 queued</Badge>
          <Badge variant="emerald" size="sm" dot>Beta</Badge>
          {chips.map(c => <Badge key={c} variant="info" onRemove={() => setChips(cs => cs.filter(x => x !== c))}>{c}</Badge>)}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
