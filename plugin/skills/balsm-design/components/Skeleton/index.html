<!-- @dsCard group="Components" name="Skeleton" subtitle="shimmer placeholders · text · card · list rows" viewport="760x320" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:30px}
    .col{display:flex;flex-direction:column;gap:14px;min-width:0}
    .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);
         font-weight:600;font-family:var(--font-body)}
    .card{border:1px solid var(--balsm-ink-100);border-radius:var(--radius-lg);
      padding:18px;display:flex;flex-direction:column;gap:14px;background:#fff}
    .card-head{display:flex;gap:13px;align-items:center}
    .row-item{display:flex;gap:13px;align-items:center;padding:11px 4px;
      border-bottom:1px solid var(--balsm-ink-100)}
    .row-item:last-child{border-bottom:none}
    .row-body{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function Skeleton({ variant='rect', width, height, lines=1, lastWidth='62%', radius, className='', style, ...rest }) {
    const dim=(v)=>typeof v==='number'?`${v}px`:v;
    if(variant==='text' && lines>1){
      return <span className="b-skeleton-lines" style={{width:dim(width),...style}} {...rest}>
        {Array.from({length:lines}).map((_,i)=><span key={i} className="b-skeleton b-skeleton--text" style={{width:i===lines-1?lastWidth:'100%'}}/>)}
      </span>;
    }
    const cls=['b-skeleton', variant!=='rect'&&`b-skeleton--${variant}`, className].filter(Boolean).join(' ');
    const st={...style};
    if(width!=null) st.width=dim(width);
    if(height!=null) st.height=dim(height);
    if(radius!=null) st.borderRadius=dim(radius);
    if(variant==='circle' && height==null && width!=null) st.height=dim(width);
    return <span className={cls} style={st} {...rest}/>;
  }

  function Demo() {
    return (
      <div className="wrap">
        <div className="col">
          <div className="lbl">Card — loading a medication</div>
          <div className="card">
            <div className="card-head">
              <Skeleton variant="circle" width={44}/>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                <Skeleton variant="title" width="64%"/>
                <Skeleton variant="text" width="40%"/>
              </div>
              <Skeleton variant="pill" width={62} height={22}/>
            </div>
            <Skeleton variant="text" lines={3}/>
            <Skeleton variant="card" height={84}/>
          </div>
        </div>

        <div className="col">
          <div className="lbl">List rows — dispense queue</div>
          <div className="card" style={{padding:'4px 14px'}}>
            {[0,1,2,3].map(i=>(
              <div className="row-item" key={i}>
                <Skeleton variant="circle" width={32}/>
                <div className="row-body">
                  <Skeleton variant="text" width={`${78-i*9}%`}/>
                  <Skeleton variant="text" width={`${44-i*6}%`}/>
                </div>
                <Skeleton variant="pill" width={48} height={18}/>
              </div>
            ))}
          </div>
          <div className="lbl">Primitives</div>
          <div style={{display:'flex',gap:14,alignItems:'center'}}>
            <Skeleton variant="circle" width={36}/>
            <Skeleton variant="pill" width={70} height={24}/>
            <Skeleton variant="rect" width={90} height={36} radius={10}/>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
