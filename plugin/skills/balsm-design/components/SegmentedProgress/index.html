<!-- @dsCard group="Components" name="SegmentedProgress" subtitle="multi-part meter · storage · queue mix · inventory status" viewport="760x320" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;background:#fff}
    .wrap{padding:26px 28px;display:grid;grid-template-columns:1fr 1fr;gap:30px 40px}
    .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);font-weight:600;font-family:var(--font-body);margin-bottom:14px}
    .col{display:flex;flex-direction:column;gap:26px;min-width:0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const METER_VAR={aqua:'var(--petal-aqua)',blue:'var(--petal-blue)',mint:'var(--petal-mint)',violet:'var(--petal-violet)',emerald:'var(--petal-emerald)',sun:'var(--balsm-warning)',danger:'var(--balsm-danger)',ink:'var(--balsm-ink-300)'};
  function SegmentedProgress({ segments=[], total, title, showTotal=false, showLegend=true, showValues=true, size='md', gap=false, format=(v)=>v, totalLabel, className='', ...rest }) {
    const sum=segments.reduce((a,s)=>a+(s.value||0),0); const max=total??sum;
    const cls=['b-meter', size!=='md'&&`b-meter--${size}`, gap&&'b-meter--gap', className].filter(Boolean).join(' ');
    const swatch=(s)=>s.hex||METER_VAR[s.color]||'var(--balsm-primary)';
    return <div className={cls} {...rest}>
      {(title||showTotal)&&<div className="b-meter__head">{title&&<span className="b-meter__title">{title}</span>}{showTotal&&<span className="b-meter__total">{totalLabel??`${format(sum)} / ${format(max)}`}</span>}</div>}
      <div className="b-meter__track" role="img" aria-label={title}>{segments.map((s,i)=>{const w=max>0?(s.value/max)*100:0;const segCls=['b-meter__seg',s.color&&`b-meter__seg--${s.color}`].filter(Boolean).join(' ');return <span key={i} className={segCls} style={{width:`${w}%`,...(s.hex?{background:s.hex}:{})}} title={`${s.label}: ${format(s.value)}`}/>;})}</div>
      {showLegend&&<div className="b-meter__legend">{segments.map((s,i)=><span className="b-meter__item" key={i}><span className="b-meter__swatch" style={{background:swatch(s)}}/>{s.label}{showValues&&s.value!=null&&<span className="b-meter__val">{format(s.value)}</span>}</span>)}</div>}
    </div>;
  }

  function Demo() {
    const gb=(v)=>`${v} GB`;
    return (
      <div className="wrap">
        <div className="col">
          <div>
            <div className="lbl">Device storage</div>
            <SegmentedProgress title="On this device" showTotal total={64} format={gb}
              segments={[{label:'Records',value:18,color:'blue'},{label:'Images',value:14,color:'aqua'},{label:'Cache',value:6,color:'violet'},{label:'Free',value:26,color:'ink'}]}/>
          </div>
          <div>
            <div className="lbl">Dispense queue mix</div>
            <SegmentedProgress
              segments={[{label:'Ready',value:24,color:'mint'},{label:'In progress',value:9,color:'blue'},{label:'Waiting Rx',value:5,color:'sun'},{label:'Hold',value:2,color:'danger'}]}/>
          </div>
        </div>
        <div className="col">
          <div>
            <div className="lbl">Separated pills · inventory status</div>
            <SegmentedProgress gap size="lg"
              segments={[{label:'In stock',value:312,color:'mint'},{label:'Low',value:48,color:'sun'},{label:'Expiring',value:17,color:'violet'},{label:'Out',value:9,color:'danger'}]}/>
          </div>
          <div>
            <div className="lbl">Compact · no legend</div>
            <SegmentedProgress size="sm" showLegend={false}
              segments={[{label:'Synced',value:88,color:'mint'},{label:'Queued',value:12,color:'ink'}]}/>
            <div style={{marginTop:18}}>
              <SegmentedProgress size="sm" showLegend={false}
                segments={[{label:'A',value:40,color:'aqua'},{label:'B',value:35,color:'blue'},{label:'C',value:25,color:'violet'}]}/>
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
