<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Spacing · 4px scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:var(--fg1);font-family:var(--font-body)}
  .card{padding:24px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:14px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg3);min-width:120px}
  .bar{background:var(--petal-aqua);height:14px;border-radius:4px}
  .ruler{flex:1;display:flex;align-items:center}
  .val{font-size:11px;color:var(--fg2);min-width:38px;text-align:right}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="label">--space-1</div><div class="ruler"><div class="bar" style="width:4px"></div></div><div class="val">4 px</div></div>
  <div class="row"><div class="label">--space-2</div><div class="ruler"><div class="bar" style="width:8px"></div></div><div class="val">8 px</div></div>
  <div class="row"><div class="label">--space-3</div><div class="ruler"><div class="bar" style="width:12px"></div></div><div class="val">12 px</div></div>
  <div class="row"><div class="label">--space-4</div><div class="ruler"><div class="bar" style="width:16px"></div></div><div class="val">16 px</div></div>
  <div class="row"><div class="label">--space-5</div><div class="ruler"><div class="bar" style="width:20px"></div></div><div class="val">20 px</div></div>
  <div class="row"><div class="label">--space-6 ★</div><div class="ruler"><div class="bar" style="width:24px"></div></div><div class="val">24 px</div></div>
  <div class="row"><div class="label">--space-8 ★</div><div class="ruler"><div class="bar" style="width:32px"></div></div><div class="val">32 px</div></div>
  <div class="row"><div class="label">--space-10</div><div class="ruler"><div class="bar" style="width:40px"></div></div><div class="val">40 px</div></div>
  <div class="row"><div class="label">--space-12 ★</div><div class="ruler"><div class="bar" style="width:48px"></div></div><div class="val">48 px</div></div>
  <div class="row"><div class="label">--space-16</div><div class="ruler"><div class="bar" style="width:64px"></div></div><div class="val">64 px</div></div>
</div>
</body></html>
