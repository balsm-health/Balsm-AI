<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Type · Display Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:var(--fg1)}
  .card{padding:24px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--balsm-ink-100);padding-bottom:8px}
  .row:last-child{border-bottom:none}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);min-width:170px}
  .sample{flex:1;font-family:var(--font-display);color:var(--balsm-ink-900)}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="meta">.h-display · 72/800</div><div class="sample" style="font-size:56px;font-weight:800;letter-spacing:-0.02em;line-height:1">Healing, locally.</div></div>
  <div class="row"><div class="meta">.h1 · 44/700</div><div class="sample" style="font-size:36px;font-weight:700;letter-spacing:-0.01em;line-height:1.1">Pharmacy operations</div></div>
  <div class="row"><div class="meta">.h2 · 34/700</div><div class="sample" style="font-size:28px;font-weight:700;line-height:1.2">Today's reconciliation</div></div>
  <div class="row"><div class="meta">.h3 · 28/600</div><div class="sample" style="font-size:22px;font-weight:600;line-height:1.3">Walk-in sale</div></div>
  <div class="row"><div class="meta">.h4 · 22/600</div><div class="sample" style="font-size:18px;font-weight:600;line-height:1.3">Customer profile</div></div>
</div>
</body></html>
