<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Brand · Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg1)}
  .card{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:10px;padding:18px;height:180px;box-sizing:border-box}
  .g{border-radius:14px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm);color:#fff}
  .name{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.01em}
  .meta{font-family:var(--font-mono);font-size:10px;opacity:.9;line-height:1.4}
  .g.petal{background:var(--grad-petal)}
  .g.mint{background:var(--grad-mint);color:#0E3E1F}
  .g.sky{background:var(--grad-sky)}
  .g.violet{background:var(--grad-violet)}
  .g.cream{background:var(--grad-cream);color:var(--balsm-ink-900);border:1px solid var(--balsm-border);box-shadow:none}
</style></head>
<body>
<div class="card">
  <div class="g petal"><div class="name">Petal sweep</div><div class="meta">--grad-petal<br>aqua → blue → violet · 135°<br>brand moments only</div></div>
  <div class="g mint"><div class="name">Mint</div><div class="meta">--grad-mint<br>#55D77F → #01C4A2</div></div>
  <div class="g sky"><div class="name">Sky</div><div class="meta">--grad-sky<br>#1283FF → #0F6BCC</div></div>
  <div class="g violet"><div class="name">Violet</div><div class="meta">--grad-violet<br>#8E6FE0 → #724DD0</div></div>
  <div class="g cream"><div class="name">Cream</div><div class="meta">--grad-cream<br>#FAFAF7 → #F4F3EC · 180°</div></div>
</div>
</body></html>
