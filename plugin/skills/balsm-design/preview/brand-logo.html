<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:var(--fg1);font-family:var(--font-body)}
  .card{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:14px;padding:18px;height:200px;box-sizing:border-box;align-items:stretch}
  .panel{border:1px solid var(--balsm-border);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fff}
  .panel.cream{background:var(--balsm-cream-100)}
  .panel.ink{background:var(--balsm-ink-900)}
  .panel img.logo{height:130px;width:auto;display:block}
  .tag{position:absolute;left:10px;bottom:8px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3);font-weight:600}
  .panel.ink .tag{color:rgba(255,255,255,.6)}
</style></head>
<body>
<div class="card">
  <div class="panel"><img class="logo" src="../brand/logo-vertical.svg" alt="Balsm.health"><div class="tag">Vertical · primary</div></div>
  <div class="panel cream"><img class="logo" src="../brand/logo-vertical.png" alt=""><div class="tag">On cream</div></div>
  <div class="panel ink"><img class="logo" src="../brand/logo-vertical-white.png" alt=""><div class="tag">Reverse · on ink</div></div>
</div>
</body></html>
