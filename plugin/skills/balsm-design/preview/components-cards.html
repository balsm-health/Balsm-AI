<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;background:var(--balsm-surface-muted);color:var(--fg1);font-family:var(--font-body)}
  .card{padding:22px;display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:14px;background:var(--balsm-surface-muted)}
  .c{background:#fff;border:1px solid var(--balsm-border);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px}
  .c.metric{padding:18px}
  .ttl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);font-weight:600}
  .val{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--balsm-ink-900);letter-spacing:-.01em;line-height:1}
  .sub{font-size:12px;color:var(--fg3)}
  .delta-pos{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#1F6A36}
  .delta-pos::before{content:"";width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid var(--petal-mint)}
  .row-head{display:flex;align-items:center;gap:8px}
  .ico{width:36px;height:36px;border-radius:10px;background:var(--petal-blue-50);color:var(--balsm-primary);display:flex;align-items:center;justify-content:center}
  .name{font-weight:600;color:var(--balsm-ink-900)}
  .stack{display:flex;flex-direction:column;gap:2px;flex:1}
  .meta{font-size:11px;color:var(--fg3)}
  .product .price{font-family:var(--font-mono);font-weight:600;color:var(--balsm-ink-900)}
  .product .stock{font-size:11px;color:var(--fg3)}
  .product hr{border:0;height:1px;background:var(--balsm-ink-100)}
</style></head>
<body>
<div class="card">
  <div class="c metric">
    <div class="ttl">Today's sales</div>
    <div class="val">LE 4,820</div>
    <div class="row-head"><span class="delta-pos">+12.4%</span><span class="sub">vs. yesterday · 47 transactions</span></div>
  </div>
  <div class="c">
    <div class="row-head"><div class="ico"><i data-lucide="user"></i></div>
      <div class="stack"><div class="name">Mona Hassan</div><div class="meta">+20 10 1234 5678 · 6 visits</div></div>
    </div>
    <hr style="border:0;height:1px;background:var(--balsm-ink-100);margin:4px 0">
    <div class="meta">Allergies · Penicillin · Chronic · Hypertension</div>
  </div>
  <div class="c product">
    <div class="name">Paracetamol 500 mg</div>
    <div class="meta">Pain relief · Tablet · 20 ct</div>
    <hr>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="price">LE 18.50</span><span class="stock">142 in stock</span>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
